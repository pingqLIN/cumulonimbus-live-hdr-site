    <style>
        :root {
            color-scheme: light;
            --sky-50: oklch(98% 0.012 235);
            --sky-100: oklch(95% 0.025 235);
            --sky-150: oklch(92% 0.034 235);
            --sky-200: oklch(86% 0.048 232);
            --cloud-ink: oklch(24% 0.035 245);
            --cloud-muted: oklch(48% 0.035 245);
            --line: oklch(79% 0.045 232 / 0.68);
            --panel: oklch(98% 0.011 235 / 0.84);
            --panel-strong: oklch(96% 0.022 235 / 0.94);
            --sunlit: oklch(78% 0.105 78);
            --blue-signal: oklch(62% 0.13 232);
            --storm-shadow: oklch(45% 0.06 282);
            --danger: oklch(58% 0.13 28);
            --stage-sky-fill: #48455b;
            --stage-edge-top: var(--stage-sky-fill);
            --stage-edge-right: var(--stage-sky-fill);
            --stage-edge-bottom: var(--stage-sky-fill);
            --stage-edge-left: var(--stage-sky-fill);
            --stage-render-top: 0px;
            --stage-render-right: 100vw;
            --stage-render-bottom: 100vh;
            --stage-render-left: 0px;
            --stage-shadow: 0 28px 80px oklch(46% 0.08 238 / 0.24);
        }
        * { box-sizing: border-box; }
        html {
            min-height: 100%;
            background: var(--stage-sky-fill);
        }
        html[data-background="transparent"] {
            background: transparent;
        }
        body {
            position: relative;
            margin: 0;
            min-height: 100vh;
            padding: clamp(0.75rem, 1.8vw, 1.4rem);
            color: var(--cloud-muted);
            font-family: "Segoe UI Variable", "Aptos", "Segoe UI", system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            flex-direction: column;
            letter-spacing: 0;
            background: var(--stage-sky-fill);
        }
        body::before,
        body::after {
            content: "";
            display: none;
            position: fixed;
            inset: auto;
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            left: -8vw;
            right: -6vw;
            bottom: -14vh;
            height: 42vh;
            background:
                radial-gradient(ellipse at 15% 65%, oklch(100% 0.01 235 / 0.86) 0 18%, transparent 19%),
                radial-gradient(ellipse at 39% 45%, oklch(100% 0.011 235 / 0.72) 0 21%, transparent 22%),
                radial-gradient(ellipse at 70% 60%, oklch(100% 0.012 235 / 0.8) 0 23%, transparent 24%);

        }
        body::after {
            inset: 0;
            background:
                linear-gradient(115deg, transparent 0 18%, oklch(75% 0.055 232 / 0.22) 18.1% 18.35%, transparent 18.45% 100%),
                linear-gradient(150deg, transparent 0 66%, oklch(76% 0.04 232 / 0.18) 66.1% 66.35%, transparent 66.45% 100%);
            mask-image: linear-gradient(180deg, oklch(0% 0 0) 0 78%, transparent 100%);
        }
        body.fullscreen-mode {
            padding: 0;
            background: var(--stage-sky-fill);
            align-items: center;
        }
        body[data-controls-hidden="true"] {
            padding: 0;
            background: var(--stage-sky-fill);
        }
        body[data-background="transparent"],
        body[data-background="transparent"].fullscreen-mode,
        body[data-background="transparent"][data-controls-hidden="true"] {
            padding: 0;
            background: transparent;
        }
        body[data-background="transparent"]::before,
        body[data-background="transparent"]::after {
            display: none;
        }
        body[data-viewport-mode="background"] {
            padding: 0;
            align-items: stretch;
            justify-content: stretch;
            background: var(--stage-sky-fill);
        }
        body[data-viewport-mode="background"]::before,
        body[data-viewport-mode="background"]::after {
            display: none;
        }
        #stage-edge-fill {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background: var(--stage-sky-fill);
        }
        html[data-background="transparent"] #stage-edge-fill {
            display: none;
        }
        .stage-edge-fill__top,
        .stage-edge-fill__top-left,
        .stage-edge-fill__top-right,
        .stage-edge-fill__right,
        .stage-edge-fill__bottom,
        .stage-edge-fill__bottom-left,
        .stage-edge-fill__bottom-right,
        .stage-edge-fill__left {
            position: absolute;
            display: block;
            pointer-events: none;
            image-rendering: auto;
            filter: blur(10px);
            transform: scale(1.035);
            transform-origin: center;
        }
        .stage-edge-fill__top {
            top: 0;
            left: var(--stage-render-left);
            width: calc(var(--stage-render-right) - var(--stage-render-left));
            height: var(--stage-render-top);
            background: var(--stage-edge-top);
        }
        .stage-edge-fill__top-left {
            top: 0;
            left: 0;
            width: var(--stage-render-left);
            height: var(--stage-render-top);
            background: var(--stage-edge-top);
        }
        .stage-edge-fill__top-right {
            top: 0;
            right: 0;
            width: calc(100vw - var(--stage-render-right));
            height: var(--stage-render-top);
            background: var(--stage-edge-top);
        }
        .stage-edge-fill__right {
            top: var(--stage-render-top);
            right: 0;
            left: var(--stage-render-right);
            width: calc(100vw - var(--stage-render-right));
            height: calc(var(--stage-render-bottom) - var(--stage-render-top));
            background: var(--stage-edge-right);
        }
        .stage-edge-fill__bottom {
            left: var(--stage-render-left);
            bottom: 0;
            width: calc(var(--stage-render-right) - var(--stage-render-left));
            height: calc(100vh - var(--stage-render-bottom));
            background: var(--stage-edge-bottom);
        }
        .stage-edge-fill__bottom-left {
            bottom: 0;
            left: 0;
            width: var(--stage-render-left);
            height: calc(100vh - var(--stage-render-bottom));
            background: var(--stage-edge-bottom);
        }
        .stage-edge-fill__bottom-right {
            right: 0;
            bottom: 0;
            width: calc(100vw - var(--stage-render-right));
            height: calc(100vh - var(--stage-render-bottom));
            background: var(--stage-edge-bottom);
        }
        .stage-edge-fill__left {
            top: var(--stage-render-top);
            left: 0;
            width: var(--stage-render-left);
            height: calc(var(--stage-render-bottom) - var(--stage-render-top));
            background: var(--stage-edge-left);
        }
        #stage-edge-fill canvas {
            cursor: default;
        }
        #render-container,
        #ui-bar {
            position: relative;
            z-index: 1;
        }
        #render-container {
            background: var(--stage-sky-fill);
            border: 0;
            border-radius: 0;
            box-shadow: none;
            transition: box-shadow 0.22s ease, border-color 0.22s ease, transform 0.22s ease;
            overflow: hidden;
        }
        #render-container::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            background:
                linear-gradient(180deg, oklch(100% 0.006 235 / 0.22), transparent 28%),
                linear-gradient(90deg, oklch(68% 0.08 232 / 0.24), transparent 22%, transparent 72%, oklch(78% 0.09 78 / 0.18));
            mix-blend-mode: screen;
            display: none;
        }
        .viewport-portrait { width: 360px; height: 640px; max-width: 95vw; max-height: 82vh; }
        .viewport-landscape { width: 900px; height: 506px; max-width: 95vw; max-height: 82vh; }
        .viewport-fullscreen { width: 100vw; height: 100vh; max-width: none; max-height: none; border: 0; border-radius: 0; box-shadow: none; }
        body[data-controls-hidden="true"] #render-container {
            border: 0;
            border-radius: 0;
            box-shadow: none;
        }
        body[data-controls-hidden="true"] .viewport-portrait,
        body[data-controls-hidden="true"] .viewport-landscape {
            max-width: 100vw;
            max-height: 100vh;
        }
        body[data-background="transparent"] #render-container {
            background: transparent;
            border: 0;
            border-radius: 0;
            box-shadow: none;
        }
        body[data-background="transparent"] #render-container::before {
            display: none;
        }
        body[data-background="transparent"] .viewport-portrait,
        body[data-background="transparent"] .viewport-landscape {
            max-width: 100vw;
            max-height: 100vh;
        }
        body[data-viewport-mode="background"] #render-container {
            width: 100vw;
            height: 100vh;
            max-width: none;
            max-height: none;
            border: 0;
            border-radius: 0;
            box-shadow: none;
        }
        body[data-viewport-mode="background"] #render-container::before {
            display: none;
        }
        canvas { display: block; width: 100%; height: 100%; outline: none; cursor: grab; }
        canvas:active { cursor: grabbing; }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: clamp(0.85rem, 1.6vw, 1.15rem);
            pointer-events: none;
            z-index: 10;
            background: linear-gradient(180deg, oklch(14% 0.03 248 / 0.62), transparent 72%);
        }
        .project-kicker {
            width: max-content;
            padding: 0.18rem 0.46rem;
            color: oklch(90% 0.09 220);
            border: 1px solid oklch(85% 0.08 225 / 0.36);
            border-radius: 999px;
            background: oklch(16% 0.045 248 / 0.46);
            font-size: 0.66rem;
            font-weight: 750;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            text-shadow: 0 1px 2px oklch(6% 0.02 245 / 0.8);
        }
        .project-title {
            margin-top: 0.42rem;
            color: oklch(97% 0.012 235);
            font-size: clamp(0.98rem, 1.4vw, 1.2rem);
            font-weight: 760;
            text-shadow: 0 2px 9px oklch(8% 0.02 245 / 0.7);
        }
        .hud-text {
            max-width: 42rem;
            color: oklch(91% 0.02 235);
            font-size: 0.74rem;
            line-height: 1.55;
            text-shadow: 0 2px 8px oklch(6% 0.02 245 / 0.82);
        }
        .hud-list { margin-top: 0.55rem; }
        #fps-counter { font-variant-numeric: tabular-nums; }
        .mt-4 { margin-top: 1rem; }
        .opacity-50 { opacity: 0.5; }
        #ui-bar {
            width: min(1220px, 96vw);
            margin-top: 0.95rem;
            display: flex;
            gap: 0.55rem;
            flex-wrap: wrap;
            justify-content: center;
            align-items: stretch;
            padding: 0.72rem;

            background:
                linear-gradient(180deg, oklch(100% 0.008 235 / 0.74), oklch(94% 0.025 235 / 0.62)),
                repeating-linear-gradient(90deg, transparent 0 29px, oklch(73% 0.04 232 / 0.13) 30px 31px);
            box-shadow: 0 18px 48px oklch(48% 0.06 235 / 0.18);
            backdrop-filter: blur(20px) saturate(1.08);
        }
        button {
            min-height: 2.1rem;
            padding: 0.42rem 0.66rem;
            color: var(--cloud-ink);
            border: 1px solid oklch(78% 0.043 232 / 0.72);
            border-radius: 0.62rem;
            background: linear-gradient(180deg, oklch(99% 0.009 235 / 0.94), oklch(92% 0.026 235 / 0.88));
            cursor: pointer;
            transition: background-color 0.18s ease, border-color 0.18s ease, color 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
            font-family: inherit;
            font-size: 0.75rem;
            font-weight: 650;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            white-space: nowrap;
        }
        button:hover {
            border-color: oklch(64% 0.105 232 / 0.78);
            background: linear-gradient(180deg, oklch(100% 0.008 235), oklch(90% 0.045 232));
            transform: translateY(-1px);
            box-shadow: 0 7px 18px oklch(57% 0.08 232 / 0.16);
        }
        button:focus-visible,
        input:focus-visible {
            outline: 3px solid oklch(74% 0.11 232 / 0.42);
            outline-offset: 2px;
        }
        button.active,
        button[aria-pressed="true"] {
            color: oklch(24% 0.04 245);
            border-color: oklch(68% 0.115 232 / 0.9);
            background: linear-gradient(180deg, oklch(88% 0.07 226), oklch(78% 0.1 232));
            box-shadow: inset 0 1px 0 oklch(100% 0.008 235 / 0.56), 0 9px 20px oklch(58% 0.09 232 / 0.18);
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-action {
            color: oklch(25% 0.04 75);
            border-color: oklch(67% 0.12 78 / 0.88);
            background: linear-gradient(180deg, oklch(88% 0.105 80), var(--sunlit));
        }
        .btn-action:hover { background: linear-gradient(180deg, oklch(90% 0.11 80), oklch(75% 0.12 78)); }
        .btn-toggle.enabled,
        .btn-toggle.camera.ortho,
        .btn-toggle.fullscreen.enabled,
        .btn-toggle.quality-auto {
            color: oklch(25% 0.04 245);
            border-color: oklch(64% 0.12 232 / 0.9);
            background: linear-gradient(180deg, oklch(86% 0.065 228), oklch(75% 0.095 232));
        }
        .btn-toggle.hud-off {
            color: oklch(42% 0.026 245);
            border-style: dashed;
            background: oklch(91% 0.018 235 / 0.7);
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 0.42rem;
            flex-wrap: wrap;
            padding: 0.38rem;
            border: 1px solid oklch(78% 0.04 232 / 0.62);
            border-radius: 0.8rem;
            background: linear-gradient(180deg, var(--panel), var(--panel-strong));
            box-shadow: inset 0 1px 0 oklch(100% 0.006 235 / 0.56);
        }
        .control-group__label {
            align-self: stretch;
            display: flex;
            align-items: center;
            padding: 0 0.52rem;
            min-width: max-content;
            color: var(--cloud-muted);
            font-size: 0.66rem;
            font-weight: 800;
            text-transform: uppercase;
            border-right: 1px solid oklch(78% 0.04 232 / 0.48);
            letter-spacing: 0.08em;
        }
        .slider-group {
            display: flex;
            align-items: center;
            gap: 0.42rem;
            min-height: 2.1rem;
            padding: 0.32rem 0.54rem;
            border: 1px solid oklch(80% 0.035 232 / 0.56);
            border-radius: 0.62rem;
            background: oklch(98% 0.01 235 / 0.72);
            color: var(--cloud-muted);
            font-size: 0.74rem;
            white-space: nowrap;
        }
        .slider-group label { color: var(--cloud-ink); font-weight: 650; }
        .slider-group input[type=range] {
            width: 82px;
            accent-color: var(--blue-signal);
            cursor: pointer;
        }
        .slider-group.accent-red input[type=range] { accent-color: var(--danger); }
        .seed-input {
            width: 62px;
            padding: 0.16rem 0.32rem;
            color: var(--cloud-ink);
            border: 1px solid oklch(75% 0.04 232 / 0.72);
            border-radius: 0.5rem;
            background: oklch(100% 0.006 235 / 0.76);
            font-size: 0.75rem;
            text-align: center;
            outline: none;
            font-variant-numeric: tabular-nums;
        }
        .readout {
            min-width: 2.45rem;
            color: oklch(34% 0.055 235);
            text-align: right;
            font-weight: 760;
            font-variant-numeric: tabular-nums;
        }
        .lang-switch { display: flex; align-items: center; gap: 0.25rem; }
        .lang-switch button { min-width: 2.35rem; }
        #btn-random-seed {
            padding: 2px 8px !important;
            color: oklch(25% 0.04 245);
            border-color: oklch(66% 0.11 232 / 0.72) !important;
            background: oklch(88% 0.06 228 / 0.92) !important;
        }
        body.fullscreen-mode #ui-bar {
            position: fixed;
            left: 50%;
            bottom: max(0.75rem, env(safe-area-inset-bottom));
            transform: translateX(-50%);
            width: auto;
            margin-top: 0;
            padding: 0.5rem;
            max-width: calc(100vw - 1.5rem);
            max-height: 30vh;
            overflow-y: auto;
            background: oklch(96% 0.02 235 / 0.82);
            border: 1px solid oklch(86% 0.04 232 / 0.64);
            border-radius: 0.9rem;
            opacity: 0.34;
            transition: opacity 0.18s ease;
        }
        body.fullscreen-mode #ui-bar:hover,
        body.fullscreen-mode #ui-bar:focus-within { opacity: 1; }
        body.fullscreen-mode #overlay { padding: clamp(0.65rem, 1.2vw, 1rem); }
        body[data-ui="tracing-paper"] {
            --tp-paper: 252 249 244;
            --tp-paper-cool: 246 242 236;
            --tp-ink: 40 38 35;
            --tp-line: rgb(var(--tp-ink) / 0.16);
            --tp-line-heavy: rgb(var(--tp-ink) / 0.34);
            --tp-text: rgb(var(--tp-ink) / 0.82);
            --tp-text-soft: rgb(var(--tp-ink) / 0.56);
            --tp-text-faint: rgb(var(--tp-ink) / 0.34);
            --tp-font: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
            --tp-mono: var(--tp-font);
            --tp-sans: var(--tp-font);
            --tp-weight: 300;
            --tp-panel-width: min(1180px, calc(100vw - 1.4rem));
            --tp-panel-column: calc((var(--tp-panel-width) - 5px) / 6);
            --tp-panel-min-width: 64rem;
            --tp-panel-header-height: 1.35rem;
            --tp-control-min-width: 10.75rem;
            --tp-control-min-height: 15rem;
            --tp-overlay-min-width: 24rem;
            --tp-overlay-min-height: 7.15rem;
            font-family: var(--tp-font);
            font-size: 17px;
            font-weight: var(--tp-weight);
        }
        body[data-ui="tracing-paper"] #overlay {
            position: fixed;
            top: clamp(0.42rem, 1.1vw, 0.82rem);
            left: calc((100vw - var(--tp-panel-width)) / 2);
            transform: none;
            width: min(max(var(--tp-overlay-min-width), calc((var(--tp-panel-column) * 2) + 1px)), calc(100vw - 2rem));
            min-width: min(var(--tp-overlay-min-width), calc(100vw - 2rem));
            min-height: var(--tp-overlay-min-height);
            max-width: min(62vw, var(--tp-panel-width));
            max-height: none;
            padding: 0.54rem 0.64rem 0.58rem;
            overflow: visible;
            resize: none;
            pointer-events: auto;
            color: var(--tp-text);
            font-family: var(--tp-sans);
            font-weight: var(--tp-weight);
            background:
                linear-gradient(rgb(var(--tp-ink) / 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgb(var(--tp-ink) / 0.05) 1px, transparent 1px),
                linear-gradient(rgb(var(--tp-ink) / 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgb(var(--tp-ink) / 0.025) 1px, transparent 1px),

            border: 1px solid rgb(var(--tp-ink) / 0.22);

            cursor: move;
            touch-action: none;

            letter-spacing: 0.14em;

        body[data-ui="tracing-paper"] .project-title {
            margin-top: 0.46rem;
            color: var(--tp-text);
            font-family: var(--tp-sans);
            font-size: clamp(0.9rem, 1.1vw, 1.02rem);
            font-weight: var(--tp-weight);
            letter-spacing: 0;
            text-shadow: none;

            color: var(--tp-text-soft);
            font-family: var(--tp-mono);
            font-size: 0.58rem;
            font-weight: var(--tp-weight);
            line-height: 1.52;
            letter-spacing: 0.02em;
            text-shadow: none;

        body[data-ui="tracing-paper"] .hud-list {
            margin-top: 0.46rem;

            margin-top: 0.62rem;
            color: var(--tp-text-faint);
            opacity: 1;
        }

    <script>
        const fragmentShader = `
            uniform float uTime;
            uniform vec2 uResolution;
            uniform vec3 uCameraPos;
            uniform vec3 uCameraTarget;
            uniform float uAspect;
            uniform float uTropopause;
            uniform float uShowGrid;
            uniform float uSeed;
            uniform float uSystemCount;
            uniform float uIsOrtho;
            uniform float uOrthoSize;
            uniform float uOrthoVerticalScale;
            uniform float uStepSize;
            uniform float uMaxSteps;
            uniform float uSunIntensity;
            uniform float uAmbientIntensity;
            uniform float uSunElevation;
            uniform float uSunViewerAngle;
            uniform float uFreezingLevel;
            uniform float uWindShear;
            uniform float uPhotographicStyle;
            uniform float uLightPreset;
            uniform float uSkyMode;
            uniform float uTransparentBackground;
            uniform float uHdr10Mode;
            uniform float uHdrReferencePeakNits;

            float hash(float n) { return fract(sin(n) * 43758.5453123); }

            float noise(vec3 x) {
                vec3 p = floor(x);
                vec3 f = fract(x);
                f = f * f * (3.0 - 2.0 * f);
                float n = p.x + p.y * 57.0 + 113.0 * p.z + uSeed * 17.0;
                return mix(
                    mix(mix(hash(n + 0.0), hash(n + 1.0), f.x), mix(hash(n + 57.0), hash(n + 58.0), f.x), f.y),
                    mix(mix(hash(n + 113.0), hash(n + 114.0), f.x), mix(hash(n + 170.0), hash(n + 171.0), f.x), f.y),
                    f.z
                );
            }

            float fbm(vec3 p) {
                float f = 0.0;
                float weight = 0.5;
                for (int i = 0; i < 4; i++) {
                    f += weight * (1.0 - abs(noise(p * 2.0 - 1.0)));

                        p.x * 1.74 + p.z * 0.31,
                        p.y * 1.91 + p.x * 0.17,
                        p.z * 1.63 - p.y * 0.23

            vec3 detailDomain(vec3 p) {
                return vec3(
                    p.x * 0.82 + p.z * 0.57,
                    p.y * 1.05 + p.x * 0.13 - p.z * 0.08,
                    p.z * 0.76 - p.x * 0.42 + p.y * 0.11

                safeRd.z = abs(safeRd.z) < 0.0001 ? 0.0001 : safeRd.z;

            vec3 worldToModelSpace(vec3 p) {
                float kmScale = modelKmScale();
                return vec3(p.x / kmScale, (p.y - MODEL_BASE_KM) / kmScale + MODEL_LOCAL_BASE, p.z / kmScale);
            }

            float cellCycleAngle(float phase, float speedScale, float ageOffset) {
                return uTime * 0.113 * speedScale + phase * 0.53 + ageOffset + uSeed * 0.00082;
            }

            vec2 windShearAxis(float phase) {
                float angle = phase * 0.17 + uSeed * 0.00021;
                vec2 axis = normalize(vec2(1.0, 0.28));
                mat2 rot = mat2(cos(angle), -sin(angle), sin(angle), cos(angle));
                return normalize(rot * axis);
            }

            float iceFactorAtHeight(float heightKm) {
                return smoothstep(uFreezingLevel, uTropopause, heightKm);
            }

            float getCell01(
                vec3 p,
                vec2 offset,
                float maxR,
                float phase,
                float maxH,
                float speedScale,
                float ageOffset,
                float earlyDecay,
                float anvilScale
            ) {
                float cycleAngle = cellCycleAngle(phase, speedScale, ageOffset);
                float cycle = sin(cycleAngle) * 0.5 + 0.5;
                float falling = smoothstep(0.44, 0.9, -cos(cycleAngle) * 0.5 + 0.5);
                float growth = smoothstep(0.08, 0.86, cycle);
                float mature = smoothstep(0.58, 0.92, cycle) * (1.0 - falling * 0.32);
                float decayStart = clamp(0.46 - earlyDecay, 0.18, 0.72);
                float decayEnd = clamp(0.92 - earlyDecay * 0.48, decayStart + 0.18, 0.98);
                float dissipating = falling * smoothstep(decayStart, decayEnd, cycle);

                vec2 baseLocal = p.xz - offset;
                float r = length(baseLocal);
                float currentR = maxR * (0.58 + 0.42 * growth) * (1.0 - dissipating * mix(0.08, 0.24, earlyDecay));
                float naturalTop = mix(MODEL_LOCAL_BASE + 1.05, maxH, growth);
                float actualTop = min(naturalTop, MODEL_LOCAL_TROPO);
                float height = max(0.5, actualTop - MODEL_LOCAL_BASE);
                float h = clamp((p.y - MODEL_LOCAL_BASE) / height, 0.0, 1.0);
                float lowerShelf = smoothstep(0.02, 0.18, h) * (1.0 - smoothstep(0.3, 0.52, h));
                float towerColumn = smoothstep(0.16, 0.42, h) * (1.0 - smoothstep(0.66, 0.88, h));
                float crownSpread = smoothstep(0.6, 0.94, h);
                float photo = uPhotographicStyle;
                float verticalProfile = mix(
                    0.56 + lowerShelf * 0.34 + towerColumn * 0.08 + crownSpread * 0.34,
                    0.48 + lowerShelf * 0.22 + towerColumn * 0.2 + crownSpread * 0.3,
                    photo
                );
                verticalProfile *= mix(1.0, 0.82, dissipating * smoothstep(0.12, 0.62, h));
                float hitLid = smoothstep(MODEL_LOCAL_TROPO - 1.5, MODEL_LOCAL_TROPO, naturalTop);
                float anvilMask = mix(
                    smoothstep(actualTop - 2.0, actualTop + 0.5, p.y),
                    smoothstep(actualTop - 1.05, actualTop + 0.35, p.y),
                    uPhotographicStyle
                );
                float anvilLife = hitLid * smoothstep(0.34, 0.82, cycle) * (1.0 - dissipating * 0.18);
                vec2 windAxis = windShearAxis(phase);
                float downwind = dot(baseLocal, windAxis);
                float crosswind = length(baseLocal - windAxis * downwind);
                float downwind01 = smoothstep(-maxR * 0.65, maxR * 2.6, downwind);
                float anvilLength = maxR * mix(1.0, mix(0.72, 2.45 + photo * 0.7, downwind01), uWindShear);
                float anvilWidth = maxR * mix(0.92, mix(0.74, 1.26 + photo * 0.36, downwind01), uWindShear);
                float anvilPlume = exp(-crosswind * crosswind / max(0.01, anvilWidth * anvilWidth))
                    * smoothstep(-maxR * 0.95, maxR * 3.25, downwind)
                    * (1.0 - smoothstep(anvilLength * 0.78, anvilLength * 1.18, downwind));
                float anvil = anvilLife * anvilMask * maxR * mix(1.48, 1.56, photo) * anvilScale * anvilPlume;
                float anvilSlab = max(abs(crosswind) - anvilWidth, max(-downwind - maxR * 0.95, downwind - anvilLength));
                float anvilThickness = mix(0.12, mix(0.68, 0.42, photo), anvilMask) * (0.4 + anvilLife * 0.6);
                float anvilVertical = abs(p.y - actualTop) - anvilThickness;
                float anvilShape = smax(anvilSlab - anvil * mix(0.36, 0.3, photo), anvilVertical, mix(0.52, 0.36, photo)) + (1.0 - anvilLife) * 4.0;
                float bodyTaper = mix(1.0, 0.58 + lowerShelf * 0.2 + towerColumn * 0.22 + crownSpread * 0.1, photo);
                float shape = smin(r - currentR * verticalProfile * bodyTaper, anvilShape, mix(0.92, 0.62, photo));
                float topDist = p.y - actualTop;

                float baseWave =
                    (noise(vec3(baseLocal * 0.26 + phase, uSeed * 0.17)) - 0.5) * 0.46 +
                    sin(baseLocal.x * 0.82 + phase * 1.7) * 0.12 +
                    cos(baseLocal.y * 0.7 - phase * 1.2) * 0.1;
                float undersideNoise = noise(vec3(baseLocal * 0.52 + phase * 0.7, uSeed * 0.31));
                float lowerPouch = smoothstep(maxR * 1.05, maxR * 0.18, r)
                    * max(0.0, undersideNoise - 0.28) * 0.48;
                float localBase = MODEL_LOCAL_BASE + baseWave - lowerPouch;
                float bottomDist = localBase - p.y;
                float verticalDist = smax(topDist, bottomDist, 0.72);

                float lowerDowndraft = smoothstep(0.04, 0.2, h) * (1.0 - smoothstep(0.58, 0.8, h));
                float coreVoid = (1.0 - smoothstep(maxR * 0.12, maxR * 0.72, r));
                float dryPocket = smoothstep(
                    0.36,
                    0.86,
                    noise(vec3(baseLocal * 0.34 + vec2(2.7, 8.4), phase + uTime * 0.035))
                );
                shape += dissipating * lowerDowndraft * coreVoid * dryPocket * maxR * 0.62;
                shape += dissipating * lowerDowndraft * (1.0 - mature * 0.35) * 0.18;
                return smax(shape, verticalDist, mix(1.2, 0.86, photo));
            }

            float getCell00(vec3 p, vec2 offset, float maxR, float phase, float maxH) {
                float r = length(p.xz - offset);
                float cycle = sin(uTime * 0.2 + phase) * 0.5 + 0.5;
                float currentR = maxR * (0.7 + 0.3 * cycle);
                float currentTop = mix(0.5, maxH, cycle);
                float anvil = smoothstep(currentTop - 1.5, currentTop + 0.5, p.y) * cycle * maxR * 1.5;
                float shape = r - currentR - anvil;
                float topDist = p.y - currentTop;
                vec2 baseLocal = p.xz - offset;
                float baseWave =
                    (noise(vec3(baseLocal * 0.24 + phase, uSeed * 0.17)) - 0.5) * 0.86 +
                    sin(baseLocal.x * 1.08 + phase * 1.7) * 0.18 +
                    cos(baseLocal.y * 0.82 - phase * 1.2) * 0.13;
                float undersideNoise = noise(vec3(baseLocal * 0.46 + phase * 0.7, uSeed * 0.31));
                float lowerPouch = smoothstep(maxR * 0.92, maxR * 0.12, r)
                    * max(0.0, undersideNoise - 0.28) * 0.72;
                float localBase = -1.5 + baseWave - max(0.0, lowerPouch);
                float bottomDist = localBase - p.y;
                float verticalDist = smax(topDist, bottomDist, 0.62);
                return smax(shape, verticalDist, 1.0);
            }

            float getCbCellKm(
                vec3 p,
                vec2 offset,
                float baseH,
                float topPotential,
                float baseR,
                float towerR,
                float anvilR,
                float phase,
                float maturity
            ) {
                float pulse = sin(uTime * 0.055 + phase) * 0.5 + 0.5;
                float topH = min(uTropopause, mix(baseH + 2.4, topPotential, maturity) + (pulse - 0.5) * 0.42);
                float height = max(1.0, topH - baseH);
                float h = clamp((p.y - baseH) / height, 0.0, 1.0);
                vec2 lean = vec2(sin(phase * 1.73), cos(phase * 1.17)) * mix(0.15, 0.82, h);
                vec2 local = p.xz - offset - lean;
                float twist = sin(p.y * 0.28 + phase) * 0.2;
                mat2 rot = mat2(cos(twist), -sin(twist), sin(twist), cos(twist));
                local = rot * local;

                float lower = smoothstep(0.0, 0.2, h) * (1.0 - smoothstep(0.46, 0.76, h));
                float tower = smoothstep(0.12, 0.42, h) * (1.0 - smoothstep(0.78, 0.98, h));
                float crown = smoothstep(0.68, 0.98, h);
                float cap = smoothstep(0.84, 1.0, h);
                float anvilSkew = mix(1.0, 0.68, cap);
                float towerDepthSkew = mix(0.96, 0.72, tower);
                float crownDepthSkew = mix(towerDepthSkew, 0.6, cap);
                vec2 shapedLocal = vec2(local.x * anvilSkew, local.y * crownDepthSkew);
                float r = length(shapedLocal);

                float radius = mix(baseR, towerR, smoothstep(0.06, 0.42, h));
                radius += lower * baseR * 0.18;
                radius += crown * anvilR * mix(0.32, 1.0, cap);
                radius += domainWarp(vec3(local.x * 0.32, p.y * 0.24, local.y * 0.32), phase) * mix(0.34, 1.08, tower + crown);
                radius *= 0.96 + pulse * 0.08;

                float baseWave =
                    (noise(vec3(local * 0.18 + phase, uSeed * 0.11)) - 0.5) * 0.72 +
                    sin(local.x * 0.42 + phase) * 0.18 +
                    cos(local.y * 0.36 - phase * 0.7) * 0.16;
                float basePouch = lower * max(0.0, noise(vec3(local * 0.38, phase + uSeed * 0.07)) - 0.3) * 0.72;
                float localBase = baseH + baseWave - basePouch;
                float coreDistance = length(local);
                float coreTopLift = (1.0 - smoothstep(towerR * 0.65, towerR * 2.25, coreDistance)) * 0.95 * maturity;
                float outerAnvilDrop = smoothstep(towerR * 1.25, towerR + anvilR + baseR * 0.72, coreDistance) * cap * 0.96;
                float topWave = (noise(vec3(local * 0.18 + phase * 0.4, uSeed * 0.19)) - 0.5) * mix(0.28, 0.96, crown);
                float localTop = min(uTropopause + 0.55, topH + topWave + coreTopLift - outerAnvilDrop);

                float shape = r - radius;
                float bottomDist = localBase - p.y;
                float topDist = p.y - localTop;
                float verticalDist = smax(topDist, bottomDist, 0.72);
                return smax(shape, verticalDist, 1.16);
            }

            float ellipsoidSdf(vec3 p, vec3 center, vec3 radius) {
                vec3 q = (p - center) / radius;
                return (length(q) - 1.0) * min(radius.x, min(radius.y, radius.z));
            }

            float cbLobe(vec3 p, vec3 center, vec3 radius, float phase, float roughness) {
                vec3 local = p - center;
                float d = ellipsoidSdf(p, center, radius);
                float broad = noise(vec3(local.x * 0.22 + phase, local.y * 0.28, local.z * 0.22 - phase));
                float scallop =
                    sin(local.x * 0.72 + phase) *
                    cos(local.y * 0.54 - phase * 0.6) *
                    sin(local.z * 0.62 + phase * 0.3);
                return d - (broad - 0.48) * roughness * 0.72 - scallop * roughness * 0.16;
            }

            float addLobe(float field, vec3 p, vec3 center, vec3 radius, float phase, float roughness, float blend) {
                return smin(field, cbLobe(p, center, radius, phase, roughness), blend);
            }

            float mapCloudMacro(vec3 p) {
                float widthStretch = mix(1.0, 1.2, smoothstep(0.5, 2.0, uAspect));
                vec3 layoutP = p;
                layoutP.x /= widthStretch;

                vec3 modelP = worldToModelSpace(layoutP);
                float photo = uPhotographicStyle;
                float layoutMode = mod(floor(abs(uSeed)), 3.0);
                float triangleLayout = step(0.5, layoutMode) * (1.0 - step(1.5, layoutMode));
                float clusterLayout = step(1.5, layoutMode);
                vec2 c2Offset = mix(vec2(3.75, -1.35), vec2(-2.45, -1.28), triangleLayout);
                c2Offset = mix(c2Offset, vec2(1.1, -0.58), clusterLayout);
                vec2 c3Offset = mix(vec2(-3.2, 1.55), vec2(2.5, -1.12), triangleLayout);
                c3Offset = mix(c3Offset, vec2(-0.86, 0.78), clusterLayout);
                float c2Blend = mix(mix(1.35, 0.92, photo), mix(1.58, 1.06, photo), triangleLayout);
                c2Blend = mix(c2Blend, mix(1.8, 1.18, photo), clusterLayout);
                float c3Blend = mix(mix(1.45, 0.96, photo), mix(1.58, 1.06, photo), triangleLayout);
                c3Blend = mix(c3Blend, mix(1.82, 1.2, photo), clusterLayout);

                float c1 = getCell01(modelP, vec2(0.0, 0.0), mix(3.2, 1.95, photo), 0.0, 5.0, 1.0, 0.0, 0.02, 1.0);
                float macro = c1;
                if (uSystemCount >= 1.5) {
                    float c2 = getCell01(modelP, c2Offset, mix(2.8, 1.65, photo), 2.0, mix(3.75, 3.35, photo), 0.82, 1.12, 0.28, mix(0.8, 0.48, photo));
                    macro = smin(macro, c2, c2Blend);
                }
                if (uSystemCount >= 2.5) {
                    float c3 = getCell01(modelP, c3Offset, mix(2.65, 1.75, photo), 4.0, 4.55, 1.26, 4.85, 0.1, mix(1.14, 0.74, photo));
                    macro = smin(macro, c3, c3Blend);
                }
                for (int i = 3; i < 10; i++) {
                    float fi = float(i);
                    if (uSystemCount < fi + 0.5) {
                        continue;
                    }
                    float phase = fi * 1.73 + 0.9;
                    float angle = fi * 2.399963 + uSeed * 0.00037;
                    float ring = mix(4.2, 8.6, hash(fi * 17.13 + uSeed * 0.004));
                    vec2 jitter = vec2(
                        hash(fi * 29.7 + uSeed * 0.011) - 0.5,
                        hash(fi * 41.1 + uSeed * 0.013) - 0.5
                    ) * 1.65;
                    vec2 offset = vec2(cos(angle), sin(angle)) * ring + jitter;
                    float maxR = mix(1.55, 2.65, hash(fi * 53.9 + uSeed * 0.007));
                    float maxH = mix(3.15, 5.0, hash(fi * 67.1 + uSeed * 0.009));
                    float speedScale = mix(0.72, 1.32, hash(fi * 71.3 + uSeed * 0.003));
                    float ageOffset = hash(fi * 83.5 + uSeed * 0.005) * 6.28318;
                    float earlyDecay = hash(fi * 97.7 + uSeed * 0.006) * 0.34;
                    float anvilScale = mix(0.58, 1.12, hash(fi * 101.9 + uSeed * 0.008));
                    float cell = getCell01(modelP, offset, maxR, phase, maxH, speedScale, ageOffset, earlyDecay, anvilScale);
                    macro = smin(macro, cell, mix(1.08, 0.82, photo));
                }
                float capLimiter = modelP.y - (MODEL_LOCAL_TROPO + 0.2 + (noise(vec3(modelP.xz * 0.18, uSeed * 0.23)) - 0.5) * 0.14);
                float groundLimiter = (MODEL_LOCAL_BASE - 0.35) - modelP.y;
                return smax(smax(macro, capLimiter, 0.18), groundLimiter, 0.22);
            }

            float mapCloudFromMacro(vec3 p, float macro) {
                if (macro >= 1.0) {
                    return 0.0;
                }

                vec3 q = worldToModelSpace(p);
                vec3 baseQ = q;
                q.y -= uTime * 0.25;
                q.x += uTime * 0.05;
                float heightRange = max(0.1, uTropopause - MODEL_BASE_KM);
                float height01 = clamp((p.y - MODEL_BASE_KM) / heightRange, 0.0, 1.0);

                float d = -macro;
                if (d > -1.0) {
                    float stormAngle = uTime * 0.075 + uSeed * 0.00107;
                    float stormCycle = sin(stormAngle) * 0.5 + 0.5;
                    float stormFalling = smoothstep(0.44, 0.9, -cos(stormAngle) * 0.5 + 0.5);
                    float dissipating = stormFalling * smoothstep(0.46, 0.92, stormCycle);
                    float anvilBand = smoothstep(0.72, 0.94, height01);
                    float freezing01 = clamp((uFreezingLevel - MODEL_BASE_KM) / heightRange, 0.0, 1.0);
                    float mixedPhaseBand = smoothstep(freezing01 - 0.08, freezing01 + 0.16, height01)
                        * (1.0 - smoothstep(0.72, 0.9, height01));
                    float iceFactor = iceFactorAtHeight(p.y);
                    float towerErosionBand = smoothstep(0.08, 0.24, height01) * (1.0 - smoothstep(0.58, 0.82, height01));
                    float downdraftColumn = smoothstep(
                        0.38,
                        0.88,
                        noise(vec3(q.xz * 0.28 + vec2(uTime * 0.018, -uTime * 0.01), q.y * 0.22 + uSeed * 0.09))
                    );
                    float settlingAnvil = smoothstep(
                        0.44,
                        0.9,
                        noise(vec3(q.x * 0.18 - uTime * 0.015, q.z * 0.22 + uSeed * 0.05, q.y * 0.11))
                    );
                    float photo = uPhotographicStyle;
                    float carving = noise(q * 0.4 + uTime * 0.1) * mix(1.5, 1.28, photo);
                    float details = fbm(q * 1.2) * 1.0;
                    float microBillow = fbm(vec3(q.x * 1.9, q.y * 2.05, q.z * 1.9) + vec3(uSeed * 0.017, 1.9, uTime * 0.04));
                    float broadBillow = fbm(vec3(q.x * 0.92, q.y * 1.24, q.z * 0.92) + vec3(uSeed * 0.023, 6.1, -uTime * 0.02));
                    vec2 iceAxis = windShearAxis(uSeed * 0.003 + 4.0);
                    float iceFiber = noise(vec3(
                        dot(q.xz, iceAxis) * 0.18 + uTime * 0.026,
                        q.y * 1.75,
                        dot(q.xz, vec2(-iceAxis.y, iceAxis.x)) * 0.56 + uSeed * 0.011
                    ));
                    float towerBand = smoothstep(0.12, 0.58, height01) * (1.0 - smoothstep(0.78, 1.02, height01));
                    float surfaceShell = smoothstep(-0.7, 0.16, macro) * (1.0 - smoothstep(0.18, 0.82, macro));
                    d += details - carving * 0.8;
                    d += surfaceShell * towerBand * (microBillow - 0.46) * mix(0.42, 0.74, photo);
                    d += surfaceShell * (1.0 - anvilBand) * (broadBillow - 0.44) * mix(0.0, 0.42, photo);
                    d -= surfaceShell * towerBand * smoothstep(0.58, 0.94, broadBillow) * mix(0.0, 0.18, photo);
                    d += mixedPhaseBand * surfaceShell * 0.14;
                    d += anvilBand * iceFactor * (iceFiber - 0.42) * 0.38;
                    d -= anvilBand * iceFactor * smoothstep(0.72, 0.98, iceFiber) * 0.12;
                    float edgeBand = smoothstep(-0.72, 0.34, macro);
                    float edgeCuts = noise(vec3(q.x * 0.82 + uSeed * 0.019, q.y * 0.92, q.z * 0.82 - uTime * 0.03));
                    d -= edgeBand * smoothstep(0.5, 0.86, edgeCuts) * mix(0.24, 0.38, photo);
                    float raggedFloor =
                        MODEL_LOCAL_BASE +
                        (noise(vec3(baseQ.xz * 0.58 + uSeed * 0.13, uSeed * 0.29)) - 0.5) * 0.68 +
                        sin(baseQ.x * 0.72 + uSeed * 0.04) * 0.12;
                    float undersideBand = 1.0 - smoothstep(raggedFloor - 0.12, raggedFloor + 0.52, baseQ.y);
                    float undersidePocket = smoothstep(
                        0.32,
                        0.88,
                        noise(vec3(baseQ.xz * 1.18 + vec2(3.4, 7.1), uSeed * 0.41))
                    );
                    d -= undersideBand * undersidePocket * 0.42;
                    d -= dissipating * towerErosionBand * downdraftColumn * 0.72;
                    d -= dissipating * undersideBand * 0.22;
                    d += dissipating * anvilBand * (1.0 - settlingAnvil * 0.68) * 0.12;
                    d -= dissipating * anvilBand * settlingAnvil * 0.16;
                }
                return clamp(d, 0.0, 1.0);
            }

            float mapCloud(vec3 p) {
                return mapCloudFromMacro(p, mapCloudMacro(p));
            }

            float phaseHG(float cosTheta, float g) {
                float g2 = g * g;
                return (1.0 - g2) / (4.0 * 3.14159 * pow(1.0 + g2 - 2.0 * g * cosTheta, 1.5));
            }

            vec3 ACESFilm(vec3 x) {
                float a = 2.51; float b = 0.03; float c = 2.43; float d = 0.59; float e = 0.14;
                return clamp((x*(a*x+b))/(x*(c*x+d)+e), 0.0, 1.0);
            }

            vec3 nitsToPq(vec3 nits) {
                const float m1 = 2610.0 / 16384.0;
                const float m2 = 2523.0 / 32.0;
                const float c1 = 3424.0 / 4096.0;
                const float c2 = 2413.0 / 128.0;
                const float c3 = 2392.0 / 128.0;
                vec3 normalized = clamp(nits / 10000.0, 0.0, 1.0);
                vec3 powered = pow(normalized, vec3(m1));
                return clamp(pow((c1 + c2 * powered) / (1.0 + c3 * powered), vec3(m2)), 0.0, 1.0);
            }

            float sceneLinearToDisplayNits(float value, float highlightPeakNits) {
                const float diffuseWhiteNits = 203.0;
                float linear = max(0.0, value);
                if (linear <= 1.0) {
                    return linear * diffuseWhiteNits;
                }
                float highlight = 1.0 - exp(-(linear - 1.0) * 1.15);
                return diffuseWhiteNits + highlight * (max(diffuseWhiteNits, highlightPeakNits) - diffuseWhiteNits);
            }

            vec3 hdr10ReferencePreview(vec3 sceneLinear, float densityAcc, float sunHeight01, float sunForward) {
                const float clearSkyLowNits = 1000.0;
                const float clearSkyHighNits = 20000.0;
                const float sunlitCloudNits = 12000.0;
                float naturalSkyNits = mix(clearSkyLowNits, clearSkyHighNits, sunHeight01);
                float cloudForwardScatter = smoothstep(0.12, 0.92, sunForward);
                float naturalCloudNits = mix(650.0, sunlitCloudNits, sunHeight01) * mix(0.76, 1.22, cloudForwardScatter);
                float naturalSceneNits = mix(naturalSkyNits, naturalCloudNits, densityAcc);
                float highlightPeakNits = 203.0 + (uHdrReferencePeakNits - 203.0) * (1.0 - exp(-naturalSceneNits / 7200.0));
                vec3 mappedNits = vec3(
                    sceneLinearToDisplayNits(sceneLinear.r, highlightPeakNits),
                    sceneLinearToDisplayNits(sceneLinear.g, highlightPeakNits),
                    sceneLinearToDisplayNits(sceneLinear.b, highlightPeakNits)
                );
                vec3 pqCode = nitsToPq(mappedNits);
                vec3 daylightBalance = mix(vec3(0.92, 0.96, 1.04), vec3(1.06, 1.02, 0.94), sunHeight01 * (0.35 + cloudForwardScatter * 0.45));
                return clamp(pow(pqCode, vec3(1.0 / 1.18)) * daylightBalance, 0.0, 1.0);
            }

            vec3 gridOverlay(vec3 col, vec3 ro, vec3 rd) {
                if (uShowGrid < 0.5) return col;

                if (abs(rd.y) > 0.001) {
                    float tG = (0.0 - ro.y) / rd.y;
                    if (tG > 0.0 && tG < 160.0) {
                        vec3 pG = ro + rd * tG;
                        if (length(pG.xz) <= 15.0) {
                            float radius = length(pG.xz);
                            vec2 oneKmCell = abs(fract(pG.xz + 0.5) - 0.5);
                            vec2 fiveKmCell = abs(fract(pG.xz / 5.0 + 0.5) - 0.5) * 5.0;
                            float oneKmDist = min(oneKmCell.x, oneKmCell.y);
                            float fiveKmDist = min(fiveKmCell.x, fiveKmCell.y);
                            float oneKmAa = max(fwidth(oneKmDist), 0.002);
                            float fiveKmAa = max(fwidth(fiveKmDist), 0.002);
                            float ringDist = abs(fract(radius / 5.0 + 0.5) - 0.5) * 5.0;
                            float ringAa = max(fwidth(ringDist), 0.002);
                            float minor = 1.0 - smoothstep(0.035, 0.035 + oneKmAa, oneKmDist);

                sourceHeight,

        sliderFreezing.addEventListener('input', (event) => {
            freezingLevel = parseFloat(event.target.value);
            updateScienceReadouts();
        });

        sliderShear.addEventListener('input', (event) => {
            windShear = parseFloat(event.target.value);
            updateScienceReadouts();
        });

        sliderSun.addEventListener('input', (event) => {
            sunIntensity = parseFloat(event.target.value);
            material.uniforms.uSunIntensity.value = sunIntensity;
        });

        sliderSunElevation.addEventListener('input', (event) => {
            sunElevation = parseFloat(event.target.value);
            updateSunPositionReadouts();
        });

        sliderSunAngle.addEventListener('input', (event) => {
            sunViewerAngle = parseFloat(event.target.value);
            updateSunPositionReadouts();
        });

        sliderTime.addEventListener('input', (event) => {
            timeSpeed = parseFloat(event.target.value);
            if (timeSpeed > 0 && timePaused) {
                timePaused = false;
            }
            updateTimeReadout();
        });

        sliderQuality.addEventListener('input', (event) => {
            renderScale = parseFloat(event.target.value);
            autoQualityEnabled = false;
            applyRenderScale();
            resizeCanvasToDisplaySize();
            updateAutoQualityButton();
        });

        btnAutoQuality.addEventListener('click', () => {
            autoQualityEnabled = !autoQualityEnabled;
            updateAutoQualityButton();
        });

        btnHdr10.addEventListener('click', () => {
            hdr10Mode = !hdr10Mode;
            updateHdr10Button();
        });

        sliderSystems.addEventListener('input', (event) => {
            systemCount = Math.max(1, Math.min(MAX_CONVECTIVE_CELLS, Math.round(parseFloat(event.target.value))));
            event.target.value = String(systemCount);
            updateSystemReadout();
        });

        btnTimeToggle.addEventListener('click', () => {
            timePaused = !timePaused;
            updateTimeReadout();
        });

        btnTimeReset.addEventListener('click', () => {
            simulationTime = 0;
            material.uniforms.uTime.value = 0;
            btnTimeReset.style.transform = 'scale(0.95)';
            setTimeout(() => { btnTimeReset.style.transform = 'scale(1)'; }, 150);
        });

        btnPortrait.addEventListener('click', () => {
            setWindowedViewport('viewport-portrait', 'target.portrait');
        });

        btnLandscape.addEventListener('click', () => {
            setWindowedViewport('viewport-landscape', 'target.landscape');
        });

        btnResetCam.addEventListener('click', () => {
            resetActiveCamera();
            btnResetCam.style.transform = 'scale(0.95)';
            setTimeout(() => { btnResetCam.style.transform = 'scale(1)'; }, 150);
        });

        if (query.get('grid') === '1' || captureMode === 'ortho-grid') {
            setGridVisible(true);
        }
        if (query.get('ortho') === '1' || captureMode === 'ortho-grid') {
            setCameraMode(true);
        }
        const viewportQuery = (query.get('viewport') || presetSettings?.viewport || '').toLowerCase();
        if (viewportQuery === 'portrait') {
            setWindowedViewport('viewport-portrait', 'target.portrait');
        } else if (viewportQuery === 'landscape') {
            setWindowedViewport('viewport-landscape', 'target.landscape');
        } else if (fullBackgroundMode) {
            setWindowedViewport('viewport-fullscreen', 'target.fullscreen');
        }

        setGridVisible(false);
        setCameraMode(false);
        setWindowedViewport('viewport-fullscreen', 'target.fullscreen');
        applyLockedPresentationConfig();

        let lastTime = performance.now();
        let frames = 0;
        let fpsAccumulator = 0;
        let fpsSamples = 0;
        let autoQualityCooldown = 0;
        const fpsEl = getUiElement('fps-counter');

        function applyAutoQualityGovernor(avgFps) {
            if (!autoQualityEnabled || autoQualityCooldown > 0) return;
            // Fullscreen framebuffer resizes are visually disruptive, so keep its entry scale stable.
            if (isFullscreenDisplay) return;
            const qualityCeiling = AUTO_QUALITY_MAX_SCALE;
            let nextScale = renderScale;
            if (renderScale > qualityCeiling + 0.001) {
                nextScale = qualityCeiling;
                autoQualityCooldown = 2;
            } else if (avgFps < AUTO_QUALITY_TARGET_FPS - 8 && renderScale > AUTO_QUALITY_MIN_SCALE) {
                nextScale = Math.max(AUTO_QUALITY_MIN_SCALE, renderScale - 0.04);
                autoQualityCooldown = 2;
            }
            if (Math.abs(nextScale - renderScale) >= 0.001) {
                renderScale = nextScale;
                sliderQuality.value = String(renderScale);
                applyRenderScale();
                resizeCanvasToDisplaySize();
            }
        }

        function animate(time) {
            requestAnimationFrame(animate);
            resizeCanvasToDisplaySize();
            const activeCamera = isOrthoMode ? orthoCamera : perspCamera;
            const activeControls = isOrthoMode ? controlsOrtho : controlsPersp;
            activeControls.update();
            const deltaMs = Math.min(100, Math.max(0, time - lastFrameTime));
            lastFrameTime = time;
            if (!timePaused) {
                simulationTime += deltaMs * 0.00018 * MOTION_SPEED_SCALE * timeSpeed;
            }
            material.uniforms.uTime.value = simulationTime;
            material.uniforms.uCameraPos.value.copy(activeCamera.position);
            material.uniforms.uCameraTarget.value.copy(activeControls.target);
            if (isOrthoMode) {
                material.uniforms.uOrthoSize.value = orthoFrustumSize / orthoCamera.zoom;
            }
            renderer.render(scene, fullscreenCam);
            updateStageEdgeFill(time);
            frames++;
            if (deltaMs > 0) {
                fpsAccumulator += 1000 / deltaMs;
                fpsSamples++;
            }
            if (time - lastTime >= 1000) {
                const avgFps = fpsSamples > 0 ? fpsAccumulator / fpsSamples : frames;
                applyAutoQualityGovernor(avgFps);
                autoQualityCooldown = Math.max(0, autoQualityCooldown - 1);
                const aspectStr = (container.clientWidth / container.clientHeight).toFixed(2);
                renderer.getDrawingBufferSize(drawingBufferSize);
                const bufferStr = `${drawingBufferSize.x}x${drawingBufferSize.y}`;
                const fsCapStr = isFullscreenDisplay ? ` | FS cap: ${computeFullscreenRenderScaleCap(container.clientWidth, container.clientHeight).toFixed(2)}x` : '';
                const hdrStr = hdr10Mode ? ` | HDR10 PQ ${HDR10_REFERENCE_PEAK_NITS}nit` : '';
                fpsEl.innerHTML = `FPS: ${frames} | AVG: ${avgFps.toFixed(0)} | RES: ${renderScale.toFixed(2)}x eff ${effectiveRenderScale.toFixed(2)}x${autoQualityEnabled ? ' AUTO' : ''} | BUF: ${bufferStr}${fsCapStr} | Aspect: ${aspectStr} | Mode: ${isOrthoMode ? 'Ortho' : 'Persp'}${hdrStr} | Tropo: ${currentTropo}km | Freeze: ${freezingLevel.toFixed(1)}km | Shear: ${windShear.toFixed(2)} | Time: ${timePaused ? t('hud.timePaused') : `${timeSpeed}x`} | T: ${simulationTime.toFixed(1)}`;
                frames = 0;
                fpsAccumulator = 0;
                fpsSamples = 0;
                lastTime = time;
            }
        }

        animate(0);
    </script>
</body>
</html>
